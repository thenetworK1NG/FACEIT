<!DOCTYPE html>
<html lang="en">
	<head>
		<title>SMART FACE — Real-Time Face Capture</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<style>
			*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

			:root {
				--accent:   #7c6af7;
				--accent2:  #4fc3f7;
				--bg-dark:  #0d0d14;
				--bg-panel: rgba(13,13,22,.82);
				--border:   rgba(124,106,247,.25);
				--text:     #e8e8f0;
				--text-dim: #7a7a9a;
				--green:    #4cef9a;
				--red:      #ef4c6a;
			}

			html, body {
				width: 100%; height: 100%;
				overflow: hidden;
				font-family: 'Segoe UI', system-ui, sans-serif;
				background: var(--bg-dark);
				color: var(--text);
			}

			/* ── Canvas fills the screen ── */
			canvas { display: block; position: fixed; inset: 0; z-index: 0; }

			/* ── Loading screen ── */
			#loading-screen {
				position: fixed; inset: 0; z-index: 100;
				background: var(--bg-dark);
				display: flex; flex-direction: column;
				align-items: center; justify-content: center;
				gap: 20px;
				transition: opacity .6s ease;
			}
			#loading-screen.hidden { opacity: 0; pointer-events: none; }

			.spinner {
				width: 56px; height: 56px;
				border: 3px solid rgba(124,106,247,.2);
				border-top-color: var(--accent);
				border-radius: 50%;
				animation: spin .9s linear infinite;
			}
			@keyframes spin { to { transform: rotate(360deg); } }

			.loading-title {
				font-size: 1.5rem; font-weight: 700; letter-spacing: .12em;
				background: linear-gradient(90deg, var(--accent), var(--accent2));
				-webkit-background-clip: text; -webkit-text-fill-color: transparent;
			}
			.loading-sub { font-size: .8rem; color: var(--text-dim); letter-spacing: .08em; }

			/* ── Header bar ── */
			#header {
				position: fixed; top: 0; left: 0; right: 0; z-index: 20;
				height: 52px;
				background: var(--bg-panel);
				backdrop-filter: blur(18px);
				border-bottom: 1px solid var(--border);
				display: flex; align-items: center; padding: 0 18px; gap: 14px;
			}

			.logo-dot {
				width: 10px; height: 10px; border-radius: 50%;
				background: linear-gradient(135deg, var(--accent), var(--accent2));
				box-shadow: 0 0 8px var(--accent);
				flex-shrink: 0;
			}

			#header h1 {
				font-size: .9rem; font-weight: 700; letter-spacing: .14em;
				text-transform: uppercase;
				background: linear-gradient(90deg, var(--accent), var(--accent2));
				-webkit-background-clip: text; -webkit-text-fill-color: transparent;
			}

			.header-sep { flex: 1; }

			/* ── Status pill ── */
			.status-pill {
				display: flex; align-items: center; gap: 7px;
				padding: 5px 12px; border-radius: 20px;
				font-size: .72rem; font-weight: 600; letter-spacing: .06em;
				text-transform: uppercase;
				border: 1px solid var(--border);
				background: rgba(0,0,0,.35);
				transition: all .3s;
			}
			.status-dot {
				width: 7px; height: 7px; border-radius: 50%;
				background: var(--red);
				box-shadow: 0 0 6px var(--red);
				transition: all .3s;
			}
			.status-pill.active .status-dot {
				background: var(--green);
				box-shadow: 0 0 8px var(--green);
			}
			.status-pill.active { border-color: rgba(76,239,154,.3); }

			/* ── Icon buttons ── */
			.icon-btn {
				width: 32px; height: 32px; border-radius: 8px;
				border: 1px solid var(--border);
				background: rgba(255,255,255,.05);
				color: var(--text-dim);
				cursor: pointer; display: flex; align-items: center; justify-content: center;
				font-size: .85rem; transition: all .2s; user-select: none;
			}
			.icon-btn:hover { background: rgba(124,106,247,.18); color: var(--text); border-color: var(--accent); }

			/* ── Camera preview ── */
			#cam-preview {
				position: fixed; bottom: 80px; right: 18px; z-index: 20;
				width: 176px;
				border-radius: 12px; overflow: hidden;
				border: 1px solid var(--border);
				box-shadow: 0 8px 32px rgba(0,0,0,.6);
				background: #000;
				transition: all .3s;
			}
			#cam-preview.hidden { opacity: 0; pointer-events: none; transform: scale(.9); }
			#cam-preview-label {
				position: absolute; top: 7px; left: 9px;
				font-size: .6rem; letter-spacing: .1em; text-transform: uppercase;
				color: rgba(255,255,255,.7);
				background: rgba(0,0,0,.55);
				padding: 2px 7px; border-radius: 4px;
			}
			#cam-preview video { width: 100%; display: block; transform: scaleX(-1); }

			/* ── Bottom bar ── */
			/* download button */
			.dl-btn {
				display: flex; align-items: center; gap: 6px;
				padding: 5px 12px; border-radius: 8px;
				border: 1px solid var(--border);
				background: rgba(124,106,247,.12);
				color: var(--text); font-size: .72rem; font-weight: 600;
				letter-spacing: .05em; cursor: pointer; white-space: nowrap;
				transition: all .2s; user-select: none;
			}
			.dl-btn:hover { background: rgba(124,106,247,.28); border-color: var(--accent); }

			/* Side-panel menu items */
			.side-list button.menu-item {
				display: block; width: 100%; text-align: left;
				padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
				background: rgba(0,0,0,.06); color: var(--text); margin-bottom: 8px; cursor: pointer;
			}
			.side-list button.menu-item:hover { background: rgba(124,106,247,.12); border-color: var(--accent); color: var(--text); }

			/* accessory list items */
			.accessory-item { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
			.accessory-item .name { flex:1; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
			.accessory-item .act-btn { padding:6px 8px; border-radius:8px; border:1px solid var(--border); background:rgba(0,0,0,.06); color:var(--text); cursor:pointer; }
			.accessory-item .act-btn:hover { background: rgba(124,106,247,.12); border-color:var(--accent); }

			/* ── Blendshape panel (side drawer) ── */
			#side-panel {
				position: fixed; top: 52px; left: 0; bottom: 0; z-index: 15;
				width: 260px;
				background: var(--bg-panel);
				backdrop-filter: blur(18px);
				border-right: 1px solid var(--border);
				overflow-y: auto;
				transform: translateX(-100%);
				transition: transform .3s ease;
				padding: 14px 12px;
			}
			#side-panel.open { transform: translateX(0); }
			#side-panel::-webkit-scrollbar { width: 4px; }
			#side-panel::-webkit-scrollbar-track { background: transparent; }
			#side-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

			.panel-section-title {
				font-size: .65rem; letter-spacing: .14em; text-transform: uppercase;
				color: var(--accent); margin-bottom: 10px; padding-bottom: 6px;
				border-bottom: 1px solid var(--border);
			}

			/* hide the Live Blendshapes UI per user request (keeps DOM for logic) */
			#bs-panel { display: none; }

			.bs-row {
				display: flex; align-items: center; gap: 8px;
				margin-bottom: 6px; font-size: .72rem; color: var(--text-dim);
			}
			.bs-row span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
			.bs-bar-bg {
				width: 80px; height: 5px; border-radius: 3px;
				background: rgba(255,255,255,.07); flex-shrink: 0; overflow: hidden;
			}
			.bs-bar-fill {
				height: 100%; border-radius: 3px;
				background: linear-gradient(90deg, var(--accent), var(--accent2));
				width: 0%; transition: width .08s;
			}

			/* lil-gui repositioned + Controls title hidden */
			.lil-gui.root {
				position: fixed !important;
				top: 60px !important;
				right: 12px !important;
				z-index: 25 !important;
				max-height: calc(100vh - 80px) !important;
				overflow-y: auto !important;
			}
			.lil-gui.root > .title { display: none !important; }

			/* ── Face-detected overlay badge ── */
			#face-badge {
				position: fixed; top: 62px; left: 50%; transform: translateX(-50%);
				z-index: 20;
				padding: 5px 16px; border-radius: 20px;
				font-size: .7rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
				background: rgba(76,239,154,.12);
				border: 1px solid rgba(76,239,154,.4);
				color: var(--green);
				opacity: 0; transition: opacity .4s;
				pointer-events: none;
			}
			#face-badge.visible { opacity: 1; }

			/* ── Smile indicator ── */
			#smile-badge {
				position: fixed; top: 62px; right: 18px; z-index: 20;
				padding: 8px 10px; border-radius: 14px;
				font-size: 1.6rem; font-weight: 700; line-height: 1; text-transform: none;
				background: rgba(124,106,247,.06);
				border: 1px solid rgba(124,106,247,.14);
				color: var(--accent);
				opacity: 0; transition: opacity .18s, transform .18s;
				pointer-events: none;
			}
			#smile-badge.visible { opacity: 1; transform: translateY(-2px); }

			#mouth-badge {
				position: fixed; top: 96px; right: 18px; z-index: 20;
				padding: 8px 10px; border-radius: 14px;
				font-size: 1.6rem; font-weight: 700; line-height: 1; text-transform: none;
				background: rgba(124,106,247,.06);
				border: 1px solid rgba(124,106,247,.14);
				color: var(--accent);
				opacity: 0; transition: opacity .18s, transform .18s;
				pointer-events: none;
			}
			#mouth-badge.visible { opacity: 1; transform: translateY(-2px); }

			#angry-badge {
				position: fixed; top: 130px; right: 18px; z-index: 20;
				padding: 8px 10px; border-radius: 14px;
				font-size: 1.6rem; font-weight: 700; line-height: 1; text-transform: none;
				background: rgba(239,76,106,.06);
				border: 1px solid rgba(239,76,106,.12);
				color: var(--red);
				opacity: 0; transition: opacity .18s, transform .18s;
				pointer-events: none;
			}
			#angry-badge.visible { opacity: 1; transform: translateY(-2px); }

			#surprised-badge {
				position: fixed; top: 164px; right: 18px; z-index: 20;
				padding: 8px 10px; border-radius: 14px;
				font-size: 1.6rem; font-weight: 700; line-height: 1; text-transform: none;
				background: rgba(127,219,255,.06);
				border: 1px solid rgba(79,195,247,.08);
				color: var(--accent2);
				opacity: 0; transition: opacity .18s, transform .18s;
				pointer-events: none;
			}
			#surprised-badge.visible { opacity: 1; transform: translateY(-2px); }

			#neutral-badge {
				position: fixed; top: 198px; right: 18px; z-index: 20;
				padding: 8px 10px; border-radius: 14px;
				font-size: 1.6rem; font-weight: 700; line-height: 1; text-transform: none;
				background: rgba(255,255,255,.02);
				border: 1px solid rgba(255,255,255,.04);
				color: var(--text);
				opacity: 0; transition: opacity .18s, transform .18s;
				pointer-events: none;
			}
			#neutral-badge.visible { opacity: 1; transform: translateY(-2px); }
		</style>
	</head>
	<body>

		<!-- Loading screen -->
		<div id="loading-screen">
			<div class="spinner"></div>
			<div class="loading-title">SMART FACE</div>
			<div class="loading-sub">Loading 3D model &amp; AI engine…</div>
		</div>

		<!-- Header -->
		<div id="header">
			<div class="logo-dot"></div>
			<h1>Smart Face</h1>
			<div class="header-sep"></div>
			<!-- Compact menu buttons: open side-panel for Heads / Prompts (props) -->
			<div id="model-picker" style="display:flex;align-items:center;gap:8px">
				<button id="btn-heads" class="dl-btn" title="Open Heads menu">Heads</button>
				<button id="btn-prompts" class="dl-btn" title="Open Prompts menu">Prompts</button>
			</div>
			<div class="status-pill" id="status-pill">
				<div class="status-dot"></div>
				<span id="status-text">Camera Off</span>
			</div>

			<div class="icon-btn" id="btn-cam" title="Toggle camera preview">&#128247;</div>
			<div class="icon-btn" id="btn-anim" title="Toggle animations">&#9654;</div>
		</div>

		<!-- Face detected badge -->
		<div id="face-badge">&#10004; Face Detected</div>
		<!-- Smile indicator (emoji only) -->
		<div id="smile-badge">😊</div>
		<!-- Mouth open / talking indicator (emoji only) -->
		<div id="mouth-badge">💬</div>
		<!-- Angry / brow-down indicator (emoji only) -->
		<div id="angry-badge">😠</div>
		<!-- Surprised / brows-up indicator (emoji only) -->
		<div id="surprised-badge">😮</div>
		<!-- Neutral indicator (emoji only) -->
		<div id="neutral-badge">😐</div>

		<!-- Side blendshape / menus panel -->
		<div id="side-panel">
			<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
				<div class="panel-section-title" id="side-title">Menu</div>
				<button id="side-close" class="icon-btn" title="Close">×</button>
			</div>
			<div id="side-content"></div>
			<!-- Accessories panel: shows currently attached props with hide/remove controls -->
			<div id="accessory-panel" style="margin-top:10px">
				<div class="panel-section-title">Accessories</div>
				<div id="accessory-list"></div>
			</div>
			<div id="bs-panel">
				<div class="panel-section-title" style="margin-top:12px">Live Blendshapes</div>
				<div id="bs-list"></div>
			</div>
		</div>

		<!-- Camera preview -->
		<div id="cam-preview">
			<div id="cam-preview-label">Live Cam</div>
			<video id="preview-video" autoplay muted playsinline></video>
		</div>



		<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
					"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';

			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

			import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
			import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
			import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
			import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';

			import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

			// ── UI helpers ──────────────────────────────────────────────────
			const loadingScreen = document.getElementById( 'loading-screen' );
			const statusPill    = document.getElementById( 'status-pill' );
			const statusText    = document.getElementById( 'status-text' );
			const faceBadge     = document.getElementById( 'face-badge' );
			const sidePanel     = document.getElementById( 'side-panel' );
			const bsList        = document.getElementById( 'bs-list' );
			const camPreview    = document.getElementById( 'cam-preview' );
			const previewVideo  = document.getElementById( 'preview-video' );

			// Model selector elements (populated from models.json)
			const modelSelect = document.getElementById( 'model-select' );
			const btnLoadModel = document.getElementById( 'btn-load-model' );
			const propsSelect = document.getElementById( 'props-select' );
			const btnAddProp = document.getElementById( 'btn-add-prop' );

			// hook for dynamic mask loading (set later inside facecap load callback)
			let loadMaskModel = null;
			// hook for dynamic prop loading (mirrors mask loader but doesn't remove the head)


			// Populate model list from `models.json` (editable, can add more later)
			let modelsData = [];
			fetch( 'models.json' ).then( r => r.json() ).then( data => {
				modelsData = Array.isArray( data.models ) ? data.models : ( Array.isArray( data ) ? data : [] );
				// populate legacy selects if present (kept for backward compatibility)
				if ( Array.isArray( modelsData ) ) {
					for ( const m of modelsData ) {
						if ( typeof m.file === 'string' && m.file.indexOf( 'props/' ) !== -1 ) {
							if ( propsSelect ) {
								const popt = document.createElement( 'option' );
								popt.value = m.file;
								popt.textContent = m.name || m.file;
								propsSelect.appendChild( popt );
							}
						} else {
							if ( modelSelect ) {
								const opt = document.createElement( 'option' );
								opt.value = m.file;
								opt.textContent = m.name || m.file;
								modelSelect.appendChild( opt );
							}
						}
					}
				}
			} ).catch( ( e ) => {
				console.debug( 'models.json not loaded or invalid', e );
			} );

			// Wire up Load button to call the loader when ready (legacy: only if present)
			if ( btnLoadModel ) {
				btnLoadModel.addEventListener( 'click', () => {
					const path = modelSelect ? modelSelect.value : null;
					if ( !path ) return;
					if ( typeof loadMaskModel === 'function' ) {
						loadMaskModel( path, false );
					} else {
						console.warn( 'Mask loader not initialized yet; try again after the face model finishes loading.' );
					}
				} );
			}

			// Props menu: always attach on top when adding from this menu
			if ( btnAddProp ) {
				btnAddProp.addEventListener( 'click', () => {
					const path = propsSelect ? propsSelect.value : null;
					if ( !path ) return;
					if ( typeof loadMaskModel === 'function' ) {
						loadMaskModel( path, true );
					} else {
						console.warn( 'Mask loader not initialized yet; try again after the face model finishes loading.' );
					}
				} );
			}

			// Wire up Prop load button (props always attach and do not remove the head)


			// Header button toggles
			const btnSide = document.getElementById( 'btn-side' );
			if ( btnSide ) {
				btnSide.addEventListener( 'click', () => sidePanel.classList.toggle( 'open' ) );
			}

			// New header menu buttons: Heads / Prompts (populate the side-panel)
			const btnHeads = document.getElementById( 'btn-heads' );
			const btnPrompts = document.getElementById( 'btn-prompts' );
			const sideContent = document.getElementById( 'side-content' );
			const sideTitle = document.getElementById( 'side-title' );
			const sideClose = document.getElementById( 'side-close' );

			function populateSideMenu( type ) {
				sideContent.innerHTML = '';
				const list = document.createElement( 'div' );
				list.className = 'side-list';
				const items = ( type === 'prompts' )
					? ( Array.isArray( modelsData ) ? modelsData.filter( m => typeof m.file === 'string' && m.file.indexOf( 'props/' ) !== -1 ) : [] )
					: ( Array.isArray( modelsData ) ? modelsData.filter( m => !( typeof m.file === 'string' && m.file.indexOf( 'props/' ) !== -1 ) ) : [] );

				if ( items.length === 0 ) {
					const p = document.createElement( 'div' );
					p.style.color = 'var(--text-dim)';
					p.style.padding = '8px 4px';
					p.textContent = 'No items found.';
					list.appendChild( p );
				} else {
					for ( const m of items ) {
						const b = document.createElement( 'button' );
						b.className = 'menu-item';
						b.textContent = m.name || m.file;
						b.addEventListener( 'click', () => {
							if ( typeof loadMaskModel === 'function' ) {
								const attach = ( type === 'prompts' );
								loadMaskModel( m.file, attach );
								// keep the side panel open so the user can pick multiple items
							} else {
								console.warn( 'Mask loader not initialized yet; try again after the face model finishes loading.' );
							}
						} );
						list.appendChild( b );
					}
				}
				sideContent.appendChild( list );
			}

			if ( btnHeads ) btnHeads.addEventListener( 'click', () => { sideTitle.textContent = 'Heads'; populateSideMenu( 'heads' ); sidePanel.classList.add( 'open' ); } );
			if ( btnPrompts ) btnPrompts.addEventListener( 'click', () => { sideTitle.textContent = 'Prompts'; populateSideMenu( 'prompts' ); sidePanel.classList.add( 'open' ); } );
			if ( sideClose ) sideClose.addEventListener( 'click', () => sidePanel.classList.remove( 'open' ) );

			// Accessory list UI: shows attached props and provides hide/remove actions
			const accessoryListEl = document.getElementById( 'accessory-list' );

			function refreshAccessoryList() {
				if ( !accessoryListEl ) return;
				accessoryListEl.innerHTML = '';
				if ( accessoryScenes.length === 0 ) {
					const p = document.createElement( 'div' );
					p.style.color = 'var(--text-dim)';
					p.style.padding = '6px 4px';
					p.textContent = 'No accessories attached.';
					accessoryListEl.appendChild( p );
					return;
				}

				for ( let i = 0; i < accessoryScenes.length; i ++ ) {
					const a = accessoryScenes[ i ];
					if ( !a ) continue;
					const row = document.createElement( 'div' );
					row.className = 'accessory-item';
					const name = document.createElement( 'div' );
					name.className = 'name';
					name.textContent = a.name || ('accessory-' + i);

					const toggle = document.createElement( 'button' );
					toggle.className = 'act-btn';
					toggle.textContent = a.visible ? 'Hide' : 'Show';
					toggle.addEventListener( 'click', () => {
						a.visible = !a.visible;
						toggle.textContent = a.visible ? 'Hide' : 'Show';
					} );

					const remove = document.createElement( 'button' );
					remove.className = 'act-btn';
					remove.textContent = 'Remove';
					remove.addEventListener( 'click', () => {
						try {
							if ( a.parent ) a.parent.remove( a );
						} catch ( e ) { console.warn( 'Error removing accessory', e ); }
						accessoryScenes.splice( i, 1 );
						refreshAccessoryList();
					} );

					row.appendChild( name );
					row.appendChild( toggle );
					row.appendChild( remove );
					accessoryListEl.appendChild( row );
				}
			}

			// initial refresh in case accessories were added before UI ready
			setTimeout( refreshAccessoryList, 300 );

			// Global cam visibility state (controls both the corner preview and the 3D video mesh)
			let camVisible = true;

			document.getElementById( 'btn-cam' ).addEventListener( 'click', () => {
				camVisible = !camVisible;
				camPreview.classList.toggle( 'hidden', !camVisible );
				// hide the DOM preview video when camera is hidden
				previewVideo.style.display = camVisible ? '' : 'none';

			let _smoothedScale = 1.0;
			// Use values from the early-declared `maskParams` so GUI access is safe
			let SMOOTH_ALPHA = maskParams.smooth; // 0..1, higher = less smoothing (editable)
			let FORWARD_OFFSET = maskParams.forward; // meters forward so mask sits off the face (editable)
			const _tmpForward = new THREE.Vector3( 0, 0, 1 );

			function animate() {

				const delta = clock.getDelta();
				if ( mixer ) mixer.update( delta );

				if ( video.readyState >= HTMLMediaElement.HAVE_METADATA ) {

					const results = faceLandmarker.detectForVideo( video, Date.now() );

					// Face badge visibility
					const faceFound = results.facialTransformationMatrixes.length > 0;
					if ( faceFound ) {
						faceDetectedFrames = 10;
					} else {
						faceDetectedFrames = Math.max( 0, faceDetectedFrames - 1 );
					}
					faceBadge.classList.toggle( 'visible', faceDetectedFrames > 0 );

					if ( results.facialTransformationMatrixes.length > 0 ) {

						const facialTransformationMatrixes = results.facialTransformationMatrixes[ 0 ].data;

						transform.matrix.fromArray( facialTransformationMatrixes );
						transform.matrix.decompose( transform.position, transform.quaternion, transform.scale );

						const object = scene.getObjectByName( 'grp_transform' );

						// Update existing grp_transform if present (keeps original behavior)
						if ( object ) {
							object.position.x = transform.position.x;
							object.position.y = transform.position.z + 40;
							object.position.z = - transform.position.y;

							object.rotation.x = transform.rotation.x;
							object.rotation.y = transform.rotation.z;
							object.rotation.z = - transform.rotation.y;
						}

						// Also update the dedicated mask anchor so the mask follows the face reliably.
						// Use a more direct mapping and apply a small forward offset so the mask sits in front.
						// Base anchor from the facial transformation matrix (keeps correct rotation)
						const basePos = new THREE.Vector3( transform.position.x, transform.position.z, - transform.position.y );
						basePos.multiplyScalar( 0.01 ); // scale down image-space units to scene units

						// If landmark coordinates are available, compute centroid and bounding-box size
						let centroid = null;
						let faceSize = 0.12; // fallback
						if ( results.faceLandmarks && results.faceLandmarks.length > 0 ) {
							let lm = results.faceLandmarks[ 0 ];
							const points = lm.landmarks || lm; // handle different output shapes
							let sx = 0, sy = 0, sz = 0, nn = 0;
							let minx = 1, miny = 1, maxx = 0, maxy = 0;
							for ( const p of points ) {
								if ( p && typeof p.x === 'number' ) {
									sx += p.x; sy += p.y; sz += ( p.z || 0 ); nn ++;
									minx = Math.min( minx, p.x );
									miny = Math.min( miny, p.y );
									maxx = Math.max( maxx, p.x );
									maxy = Math.max( maxy, p.y );
								}
							}
							if ( nn > 0 ) centroid = { x: sx / nn, y: sy / nn, z: sz / nn };
							faceSize = Math.max( maxx - minx, maxy - miny );
						}

						// Use faceSize to compute a stronger centroid correction and derive target scale
						if ( centroid ) {
							const sizeFactor = THREE.MathUtils.clamp( faceSize * 2.5, 0.35, 2.5 );
							basePos.x += ( centroid.x - 0.5 ) * sizeFactor * 0.14; // horizontal correction scaled by face size
							basePos.y += ( 0.5 - centroid.y ) * sizeFactor * 0.14; // vertical correction
							basePos.z += - ( centroid.z || 0 ) * sizeFactor * 0.06; // depth correction

							// Choose target scale proportionally to faceSize (bigger on closer faces)
							var targetScale = THREE.MathUtils.clamp( sizeFactor * 0.6, 0.35, 3.0 );
						} else {
							var targetScale = THREE.MathUtils.clamp( transform.scale.length() * 0.01, 0.35, 3.0 );
						}

						// Smooth position
						_smoothedPos.lerp( basePos, SMOOTH_ALPHA );

						// Smooth rotation (slerp)
						_smoothedQuat.slerp( transform.quaternion, SMOOTH_ALPHA );

						// Smooth scale
						_smoothedScale = THREE.MathUtils.lerp( _smoothedScale, targetScale, SMOOTH_ALPHA );

						// Apply a forward offset in the local forward direction so mask appears in front
						const forward = _tmpForward.clone().applyQuaternion( _smoothedQuat ).multiplyScalar( FORWARD_OFFSET );

						const finalPos = _smoothedPos.clone().add( forward );

						maskAnchor.position.copy( finalPos );
						maskAnchor.quaternion.copy( _smoothedQuat );
						maskAnchor.scale.setScalar( _smoothedScale );

					}

					if ( results.faceBlendshapes.length > 0 ) {
						const faceBlendshapes = results.faceBlendshapes[ 0 ].categories;

						const eyeScore = {
							leftHorizontal: 0,
							rightHorizontal: 0,
							leftVertical: 0,
							rightVertical: 0,
						};

						let smileScore = 0;
						let mouthOpenScore = 0;
						let browDownScore = 0;
						let browUpScore = 0;

						for ( const blendshape of faceBlendshapes ) {

							const categoryName = blendshape.categoryName;
							const score = blendshape.score;

							// accumulate smile-related scores
							if ( categoryName === 'mouthSmileLeft' || categoryName === 'mouthSmileRight' ) {
								smileScore += score;
							}
							// mouth open / talking signal
							if ( categoryName === 'jawOpen' || categoryName === 'mouthOpen' ) {
								mouthOpenScore = Math.max( mouthOpenScore, score );
							}
							// brow-down signal (angry / low brows)
							if ( categoryName === 'browDownLeft' || categoryName === 'browDownRight' ) {
								browDownScore = Math.max( browDownScore, score );
							}
							// brow-up signal (surprised)
							if ( categoryName === 'browInnerUp' || categoryName === 'browOuterUpLeft' || categoryName === 'browOuterUpRight' ) {
								browUpScore = Math.max( browUpScore, score );
							}

							const index = face.morphTargetDictionary[ blendshapesMap[ categoryName ] ];

							if ( index !== undefined ) {

								face.morphTargetInfluences[ index ] = score;

							}

							// Update side-panel bars
							const fill = bsBarMap[ blendshapesMap[ categoryName ] ];
							if ( fill ) fill.style.width = ( score * 100 ).toFixed( 1 ) + '%';

							switch ( categoryName ) {

								case 'eyeLookInLeft':
									eyeScore.leftHorizontal += score;
									break;
								case 'eyeLookOutLeft':
									eyeScore.leftHorizontal -= score;
									break;
								case 'eyeLookInRight':
									eyeScore.rightHorizontal -= score;
									break;
								case 'eyeLookOutRight':
									eyeScore.rightHorizontal += score;
									break;
								case 'eyeLookUpLeft':
									eyeScore.leftVertical -= score;
									break;
								case 'eyeLookDownLeft':
									eyeScore.leftVertical += score;
									break;
								case 'eyeLookUpRight':
									eyeScore.rightVertical -= score;
									break;
								case 'eyeLookDownRight':
									eyeScore.rightVertical += score;
									break;

							}

						}

						eyeL.rotation.z = eyeScore.leftHorizontal * eyeRotationLimit;
						eyeR.rotation.z = eyeScore.rightHorizontal * eyeRotationLimit;
						eyeL.rotation.x = eyeScore.leftVertical * eyeRotationLimit;
						eyeR.rotation.x = eyeScore.rightVertical * eyeRotationLimit;

						// Smooth / debounce the smile indicator so it doesn't flicker
						if ( smileScore > 0.6 ) {
							smileDetectedFrames = 10;
						} else {
							smileDetectedFrames = Math.max( 0, smileDetectedFrames - 1 );
						}
						if ( typeof smileBadge !== 'undefined' && smileBadge ) smileBadge.classList.toggle( 'visible', smileDetectedFrames > 0 );

						// Smooth / debounce mouth-open (talking) indicator
						if ( mouthOpenScore > 0.35 ) {
							mouthOpenFrames = 10;
						} else {
							mouthOpenFrames = Math.max( 0, mouthOpenFrames - 1 );
						}
						if ( typeof mouthBadge !== 'undefined' && mouthBadge ) mouthBadge.classList.toggle( 'visible', mouthOpenFrames > 0 );

						// Smooth / debounce brow-down (angry) indicator
						if ( browDownScore > 0.45 ) {
							angerFrames = 10;
						} else {
							angerFrames = Math.max( 0, angerFrames - 1 );
						}
						if ( typeof angryBadge !== 'undefined' && angryBadge ) angryBadge.classList.toggle( 'visible', angerFrames > 0 );

						// Smooth / debounce brow-up (surprised) indicator
						if ( browUpScore > 0.45 ) {
							surpriseFrames = 10;
						} else {
							surpriseFrames = Math.max( 0, surpriseFrames - 1 );
						}
						if ( typeof surprisedBadge !== 'undefined' && surprisedBadge ) surprisedBadge.classList.toggle( 'visible', surpriseFrames > 0 );

						// Neutral: show when face present but no other emotion indicators active
						if ( faceDetectedFrames > 0 && smileDetectedFrames === 0 && mouthOpenFrames === 0 && angerFrames === 0 && surpriseFrames === 0 ) {
							neutralFrames = 10;
						} else {
							neutralFrames = Math.max( 0, neutralFrames - 1 );
						}
						if ( typeof neutralBadge !== 'undefined' && neutralBadge ) neutralBadge.classList.toggle( 'visible', neutralFrames > 0 );

					}

				}

				videomesh.scale.x = video.videoWidth / 100;
				videomesh.scale.y = video.videoHeight / 100;

				renderer.render( scene, camera );

				controls.update();

			}

			window.addEventListener( 'resize', function () {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

			} );

		</script>
	</body>
</html>
